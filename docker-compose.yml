services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: unsic-app
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - traefik-public
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.unsic.rule=Host(`unsic.muscarivps.cloud`)"
      - "traefik.http.routers.unsic.entrypoints=websecure"
      - "traefik.http.routers.unsic.tls.certresolver=letsencrypt"
      - "traefik.http.routers.unsic.middlewares=security-headers@file,compress@file"
      - "traefik.http.services.unsic.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  postgres:
    image: postgres:18-alpine
    container_name: unsic-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5439:5432"
    environment:
      POSTGRES_USER: unsic_user
      POSTGRES_PASSWORD: fqu0qhNOMdULpoHZETXAvALzhiQ2aAcI
      POSTGRES_DB: unsic_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unsic_user -d unsic_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres-data:

networks:
  traefik-public:
    external: true
