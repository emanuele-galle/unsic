name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '24'

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build application
        run: npm run build
        env:
          DATABASE_URL: postgresql://fake:fake@localhost:5432/fake
          NEXTAUTH_SECRET: build-secret
          NEXTAUTH_URL: http://localhost:3000
          SKIP_ENV_VALIDATION: true

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/projects/unsic
            git fetch origin
            git reset --hard origin/main
            /home/sviluppatore/.claude/scripts/zero-downtime-deploy.sh unsic
            echo "Deploy completed: $(git rev-parse --short HEAD)"

      - name: Health check
        run: |
          sleep 15
          curl -sf https://unsic.muscarivps.cloud/api/health || echo "Health check endpoint not available"

      - name: Notify deployment
        if: always()
        run: |
          curl -sf -X POST "https://n8n.muscarivps.cloud/webhook/deploy-notify" \
            -H "Content-Type: application/json" \
            -d '{
              "project": "unsic",
              "status": "${{ job.status }}",
              "sha": "${{ github.sha }}",
              "actor": "${{ github.actor }}"
            }' || true
